<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>코딩리쉬 독서 앱</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <style>
        /* 🎨 컬러 테마 & 기본 설정 */
        :root { --primary-color: #4A90E2; --secondary-color: #45D09E; --bg-color: #F5F7FA; --card-bg: #FFFFFF; }
        body { font-family: 'Malgun Gothic', sans-serif; margin: 0; background-color: var(--bg-color); color: #333; padding-bottom: 80px; overflow-x: hidden; }
        
        /* 💡 상단 헤더 */
        .header { display: flex; align-items: center; justify-content: space-between; padding: 20px; background: var(--card-bg); border-bottom: 1px solid #E4E7EB; position: sticky; top: 0; z-index: 100; }
        .header-left { display: flex; align-items: center; }
        .character-img { width: 60px; height: 60px; border-radius: 50%; border: 3px solid var(--primary-color); margin-right: 12px; background: #F4F8FD; display: flex; justify-content: center; align-items: center; font-size: 2em; box-shadow: 0 4px 8px rgba(0,0,0,0.1); overflow: hidden; }
        .header-info h1 { margin: 0; font-size: 1.2em; color: #2C3E50; }
        .header-info p { margin: 3px 0 0 0; font-size: 0.85em; color: #7F8C8D; font-weight: bold; }
        .btn-mypage { padding: 8px 15px; background: #2C3E50; color: #FFF; border: none; border-radius: 20px; font-weight: bold; font-size: 0.9em; cursor: pointer; box-shadow: 0 4px 8px rgba(0,0,0,0.15); transition: 0.2s; }

        /* 💡 본문 영역 */
        .content-area { padding: 15px; max-width: 800px; margin: 0 auto; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .card { background: var(--card-bg); padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); margin-bottom: 15px; }

        /* 💡 검색 및 목록 UI */
        .search-area { display: flex; gap: 8px; margin-bottom: 10px; }
        .search-input { flex: 1; padding: 10px; border: 2px solid #E4E7EB; border-radius: 8px; font-size: 0.95em; outline: none; }
        .search-btn { padding: 10px 15px; background: #2C3E50; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        .search-result { display: flex; gap: 15px; padding: 12px; border: 1px solid #F0F2F5; border-radius: 10px; margin-bottom: 10px; align-items: center; }
        .search-cover { width: 45px; height: 60px; background: #eee; border-radius: 5px; display: flex; justify-content: center; align-items: center; font-size: 1.5em; flex-shrink: 0; }
        .search-info { flex: 1; }
        .search-info h4 { margin: 0 0 5px 0; font-size: 0.95em; color: #2C3E50; }
        .btn-add-book { padding: 6px 12px; background: var(--primary-color); color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 0.85em; }

        .series-header-wrap { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .btn-toggle-list { background: #F4F8FD; border: 1px solid #E1EEFF; color: var(--primary-color); padding: 4px 10px; border-radius: 15px; font-size: 0.8em; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 5px; }
        .series-list-container { display: none; margin-top: 5px; padding-left: 5px; } 
        .series-list-container.active { display: block; } 

        .book-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #F8F9FA; cursor: pointer; border-radius: 8px; margin-bottom: 4px; background: #FFF; }
        .book-item.read { background-color: #F4F8FD; border-left: 4px solid var(--primary-color); }
        .read-count { font-size: 0.8em; padding: 3px 6px; border-radius: 8px; background: #EEE; color: #555; white-space: nowrap; }
        .read .read-count { background: var(--secondary-color); color: white; }
        .btn-delete-book { background: none; border: none; font-size: 0.9em; cursor: pointer; padding: 5px; opacity: 0.3; margin-left: 5px; }

        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .calendar-header button { background: none; border: none; font-size: 1.2em; cursor: pointer; color: var(--primary-color); font-weight: bold; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; }
        .cal-day-name { font-size: 0.8em; font-weight: bold; color: #7F8C8D; margin-bottom: 5px; }
        .cal-cell { background: #FFF; min-height: 80px; border: 1px solid #E4E7EB; border-radius: 6px; padding: 4px; display: flex; flex-direction: column; align-items: flex-start; cursor: pointer; }
        .cal-cell.empty { background: transparent; border: none; cursor: default; }
        .cal-date-num { font-size: 0.85em; font-weight: bold; color: #2C3E50; margin-bottom: 3px; align-self: flex-end; }
        .cal-record-pill { width: 100%; font-size: 0.7em; padding: 2px; margin-bottom: 2px; border-radius: 3px; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: center; box-sizing: border-box; }
        .cal-single { background-color: var(--primary-color); } 
        .cal-series { background-color: var(--secondary-color); } 

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; }
        .modal-body { background: white; width: 90%; max-width: 380px; padding: 20px; border-radius: 15px; max-height: 90vh; overflow-y: auto; }
        .modal-body label { font-size: 0.85em; font-weight: bold; color: #2C3E50; display: block; margin-bottom: 4px; }
        .modal-body input, .modal-body textarea, .modal-body select { width: 100%; margin-bottom: 12px; padding: 10px; border: 1px solid #DDD; border-radius: 8px; box-sizing: border-box; font-family: inherit; font-size: 0.95em; }
        .form-row { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 12px; gap: 10px; }
        .page-input-area { display: flex; align-items: center; gap: 5px; }
        .page-input-area input { width: 70px !important; margin: 0 !important; text-align: center; }
        .modal-btns { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-save { background: var(--primary-color); color: white; }
        .btn-close { background: #EEE; color: #333; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #EEE; z-index: 10; }
        .nav-item { flex: 1; text-align: center; padding: 15px 0; font-size: 0.85em; color: #95A5A6; cursor: pointer; font-weight: bold; }
        .nav-item.active { color: var(--primary-color); border-top: 3px solid var(--primary-color); }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-left">
            <div class="character-img" id="header-avatar"></div>
            <div class="header-info">
                <h1 id="header-title">독서 캘린더</h1>
                <p id="total-stats"></p>
            </div>
        </div>
        <button class="btn-mypage" onclick="openMyPage()">마이페이지</button>
    </div>

    <div class="content-area">
        <div id="home" class="tab-content active">
            <div class="card">
                <div class="calendar-header">
                    <button onclick="changeMonth(-1)">◀</button>
                    <h2 id="cal-month-year" style="margin:0; font-size:1.2em;"></h2>
                    <button onclick="changeMonth(1)">▶</button>
                </div>
                <div class="calendar-grid" id="calendar-days"></div>
            </div>
        </div>

        <div id="library" class="tab-content">
            <div class="card">
                <div class="search-area">
                    <input type="text" id="search-input" class="search-input" placeholder="도서명 검색">
                    <button class="search-btn" onclick="searchBook()">검색</button>
                </div>
                <div id="search-result-container"></div>
            </div>
            <div class="card"><h2 id="my-reading-title" style="font-size:1.1em; color:var(--primary-color);">📖 읽고 있는 책</h2><div id="my-reading-list"></div></div>
            <div class="card"><div class="series-header-wrap" style="cursor:pointer;" onclick="toggleList('my-completed-list', this.querySelector('.icon'))"><h2 id="my-completed-title" style="font-size:1.1em; color:var(--secondary-color); margin:0;">🏆 완독 도서</h2><span class="icon">🔽</span></div><div id="my-completed-list" class="series-list-container"></div></div>
        </div>

        <div id="all-series" class="tab-content"><div id="all-series-list"></div></div>
        <div id="records" class="tab-content">
            <button class="btn btn-save" onclick="openRecordModalNew()" style="width:100%; padding:15px; margin-bottom:10px;">새 기록 남기기</button>
            <div id="record-list"></div>
        </div>
    </div>

    <div id="record-modal" class="modal-overlay"><div class="modal-body"><h3 id="modal-main-title">독서 기록</h3><label>책 제목</label><input type="text" id="modal-book-title-input" readonly><select id="modal-book-title-select" onchange="onSelectBookChange()" style="display:none;"></select><label>날짜</label><input type="date" id="modal-date"><div class="form-row"><div><label>어디까지?</label><div class="page-input-area"><input type="number" id="modal-read-page"> <span>/ <span id="modal-total-pages">0</span>쪽</span></div></div><label><input type="checkbox" id="modal-manual-complete"> 완독</label></div><label>느낀 점</label><textarea id="modal-note" rows="2"></textarea><div class="modal-btns"><button class="btn btn-save" onclick="saveRecord()">저장</button><button class="btn btn-close" onclick="closeModal('record-modal')">취소</button></div></div></div>
    <div id="daily-detail-modal" class="modal-overlay"><div class="modal-body"><h3 id="daily-detail-title"></h3><div id="daily-detail-list"></div><button class="btn btn-close" style="width:100%;" onclick="closeModal('daily-detail-modal')">닫기</button></div></div>
    <div id="view-record-modal" class="modal-overlay"><div class="modal-body"><h3 id="view-title"></h3><p id="view-date"></p><div id="view-note" style="background:#F9F9F9; padding:15px; border-radius:8px;"></div><button class="btn btn-close" style="width:100%; margin-top:10px;" onclick="closeModal('view-record-modal')">닫기</button></div></div>
    <div id="mypage-modal" class="modal-overlay"><div class="modal-body"><h2>나의 독서 정보</h2><div id="mp-level" style="font-weight:bold; color:var(--primary-color);"></div><div id="mp-total-comp"></div><div id="mp-total-rec"></div><button class="btn btn-close" style="width:100%; margin-top:15px;" onclick="closeModal('mypage-modal')">닫기</button></div></div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="changeTab('home', '독서 캘린더', this)">독서 캘린더</div>
        <div class="nav-item" onclick="changeTab('library', '내 서재', this)">내 서재</div>
        <div class="nav-item" onclick="changeTab('all-series', '전집목록', this)">전집목록</div>
        <div class="nav-item" onclick="changeTab('records', '기록장', this)">기록장</div>
    </div>

    <script>
        const globalSeriesDB = {
            "개념씨 수학나무": ["1.수가 좋아", "2.모양 나라", "3.더하기 빼기", "4.길이 재기", "5.무게 달기", "6.넓이 비교", "7.입체도형", "8.시계 보기", "9.달력 보기", "10.분수", "11.규칙 찾기", "12.자료 정리", "13.곱하기", "14.나누기", "15.큰 수"],
            "생활 원리과학": ["1.무엇으로 만들었을까", "2.갑자기 멈추면?", "3.맛있게 보글보글", "4.앗, 떨어진다!", "5.단열이 잘되는 집", "6.동물의 한살이", "7.동물과 환경", "8.곤충", "9.수생 생물", "10.식물의 한살이", "11.광합성", "12.대기오염", "13.수질오염", "14.재활용", "15.생태계", "16.사물인터넷", "17.코딩"],
            "으랏차차 이야기한국사": ["1.단군과 고조선", "2.주몽과 고구려", "3.온조와 백제", "4.박혁거세와 신라", "5.가야의 쇠와 불", "6.광개토 대왕", "7.장수왕과 평양성", "8.선덕 여왕", "9.삼국 통일의 영웅들", "10.발해를 세운 대조영", "11.왕건과 고려", "12.서희와 거란", "13.강감찬의 외교", "14.이순신과 거북선", "15.세종 대왕과 한글"],
            "고고세계아이": ["1.미국", "2.영국", "3.프랑스", "4.독일", "5.이탈리아", "6.이집트", "7.중국", "8.일본", "9.인도", "10.브라질", "11.호주", "12.러시아", "13.스페인", "14.그리스", "15.캐나다"],
            "생활사회탐구": ["1.우리 가족", "2.사이좋은 이웃", "3.우리 동네 기관", "4.교통수단의 발달", "5.다양한 직업", "6.시장과 마트", "7.돈의 쓰임새", "8.민주주의와 선거", "9.우리나라 지도", "10.사계절과 생활", "11.세계의 날씨", "12.환경 보호", "13.전통 문화", "14.세계의 명절", "15.지구촌 이웃"],
            "이야기꽃할망": ["1.팥죽 할멈과 호랑이", "2.콩쥐 팥쥐", "3.해와 달이 된 오누이", "4.흥부와 놀부", "5.선녀와 나무꾼", "6.우렁 각시", "7.금도끼 은도끼", "8.혹부리 영감", "9.은혜 갚은 두꺼비", "10.토끼와 자라", "11.삼년고개", "12.소가 된 게으름뱅이", "13.도깨비 방망이", "14.젊어지는 샘물", "15.방귀 시합"],
            "술술이책방": ["1.토끼와 거북이", "2.개미와 베짱이", "3.시골 쥐와 서울 쥐", "4.아기 돼지 삼형제", "5.미운 오리 새끼", "6.백설공주", "7.신데렐라", "8.피노키오", "9.인어공주", "10.장화 신은 고양이", "11.잭과 콩나무", "12.피터팬", "13.알라딘과 요술램프", "14.성냥팔이 소녀", "15.헨젤과 그레텔"],
            "경제특공대": ["1.돈이 뭐예요?", "2.시장에 가요", "3.용돈을 모아요", "4.뱅크에 가요", "5.아껴 써요", "6.나눔의 기쁨", "7.물건을 사요", "8.일과 직업", "9.세계의 돈", "10.부자가 될래요", "11.광고의 비밀", "12.가격은 어떻게 정해질까", "13.세금 이야기", "14.무역의 원리", "15.경제 순환"],
            "WHO 시리즈": ["스티브 잡스", "세종대왕", "마리 퀴리", "이순신", "아인슈타인", "토머스 에디슨", "라이트 형제", "유관순", "헬렌 켈러", "나이팅게일", "빌 게이츠", "마크 저커버그", "일론 머스크", "김연아", "손흥민", "유재석", "안데르센", "베토벤", "모차르트", "워런 버핏"]
        };

        const bookPagesDB = { "1.수가 좋아": 45 };
        function getTotalPages(t) { return bookPagesDB[t] || 50; }
        
        let myLibrary = JSON.parse(localStorage.getItem('myLibrary')) || { singles: [], series: {} };
        let dailyRecords = JSON.parse(localStorage.getItem('dailyRecords')) || [];
        let bookStats = {};
        let currentCalDate = new Date(); 
        let editTargetIndex = -1;

        function saveData() {
            localStorage.setItem('myLibrary', JSON.stringify(myLibrary));
            localStorage.setItem('dailyRecords', JSON.stringify(dailyRecords));
        }

        function rebuildBookStats() {
            bookStats = {};
            [...dailyRecords].reverse().forEach(r => {
                if (!bookStats[r.title]) bookStats[r.title] = { count: 0, readPage: 0 };
                if (r.page > bookStats[r.title].readPage) bookStats[r.title].readPage = r.page;
                if (r.isComplete) { bookStats[r.title].count++; bookStats[r.title].readPage = getTotalPages(r.title); }
            });
        }

        function getLevelInfo(comps) {
            let info;
            if (comps >= 50) info = { lv: 10, emoji: "🐲" };
            else if (comps >= 40) info = { lv: 9, emoji: "🐯" };
            else if (comps >= 35) info = { lv: 8, emoji: "🦁" };
            else if (comps >= 30) info = { lv: 7, emoji: "🦅" };
            else if (comps >= 25) info = { lv: 6, emoji: "🦉" };
            else if (comps >= 20) info = { lv: 5, emoji: "🕊️" };
            else if (comps >= 15) info = { lv: 4, emoji: "🐔" };
            else if (comps >= 10) info = { lv: 3, emoji: "🐥" };
            else if (comps >= 5) info = { lv: 2, emoji: "🐣" };
            else info = { lv: 1, emoji: "🥚" };
            const avImg = [1, 2, 3, 4, 6, 7, 8];
            info.imageSrc = avImg.includes(info.lv) ? `images/${info.lv}.png` : null;
            return info;
        }

        function updateHeader() {
            const now = new Date();
            const monStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
            const comps = dailyRecords.filter(r => r.date.startsWith(monStr) && r.isComplete).length;
            const info = getLevelInfo(comps);
            document.getElementById('total-stats').innerText = `이번 달 완독: ${comps}권 | 레벨 ${info.lv}`;
            const avatar = document.getElementById('header-avatar');
            avatar.innerHTML = info.imageSrc ? `<img src="${info.imageSrc}" style="width:100%; height:100%; object-fit:cover; border-radius:50%;">` : info.emoji;
        }

        // 🚀 구글 시트 저장 핵심 함수 (가장 중요한 부분!)
        function saveRecord() {
            // 💡 1. SCRIPT_URL을 여기에 딱 한 번만 정확히 붙여넣으세요.
            const SCRIPT_URL = "여기에_배포한_URL을_붙여넣으세요"; 

            let title = document.getElementById('modal-book-title-select').style.display === 'block' ? document.getElementById('modal-book-title-select').value : document.getElementById('modal-book-title-input').value;
            if(!title) return;
            const date = document.getElementById('modal-date').value;
            const note = document.getElementById('modal-note').value.trim();
            const inputPage = parseInt(document.getElementById('modal-read-page').value);
            if (!inputPage || !note) { alert("내용을 입력하세요."); return; }
            const totalPage = parseInt(document.getElementById('modal-total-pages').innerText);
            const isManual = document.getElementById('modal-manual-complete').checked;
            let isComplete = inputPage >= totalPage || isManual;
            if (isComplete && !confirm("완독 처리할까요?")) isComplete = false;
            
            let newRecord = { title, date, page: isComplete ? totalPage : inputPage, isComplete, note };
            
            // 데이터 로컬 저장
            if (editTargetIndex > -1) dailyRecords[editTargetIndex] = newRecord;
            else dailyRecords.unshift(newRecord);
            
            // 💡 2. 구글 시트로 데이터 전송 (새 기록일 때만 전송)
            if (editTargetIndex === -1 && SCRIPT_URL.startsWith("https")) {
                fetch(SCRIPT_URL, {
                    method: "POST",
                    mode: "no-cors",
                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify(newRecord)
                }).then(() => console.log("전송 시도 완료")).catch(err => console.error("전송 오류:", err));
            }
            
            renderApp(); 
            closeModal('record-modal');
        }

        // --- 나머지 필수 UI 기능들 ---
        function searchBook() {
            const kw = document.getElementById('search-input').value.trim();
            const res = document.getElementById('search-result-container');
            res.innerHTML = ''; if(!kw) return;
            Object.keys(globalSeriesDB).filter(s => s.includes(kw)).forEach(s => {
                res.innerHTML += `<div class="search-result">📚 ${s} (전집) <button class="btn-add-book" onclick="addSeriesToLibrary('${s}')">추가</button></div>`;
            });
        }
        function addSeriesToLibrary(s) {
            if(!myLibrary.series[s]) myLibrary.series[s] = [];
            globalSeriesDB[s].forEach(t => { if(!myLibrary.series[s].includes(t)) myLibrary.series[s].push(t); });
            renderApp(); alert("추가 완료!");
        }
        function renderMyLibrary() {
            rebuildBookStats();
            let html = '';
            for(let s in myLibrary.series) {
                html += `<strong>${s}</strong>` + myLibrary.series[s].map(t => `<div class="book-item" onclick="openModal('${t}')">${t} <span class="read-count">${bookStats[t]?.count > 0 ? '⭐완독' : (bookStats[t]?.readPage || 0) + '쪽'}</span></div>`).join('');
            }
            document.getElementById('my-reading-list').innerHTML = html || '서재가 비어있습니다.';
        }
        function renderCalendar() {
            const year = currentCalDate.getFullYear(); const month = currentCalDate.getMonth();
            document.getElementById('cal-month-year').innerText = `${year}년 ${month+1}월`;
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            let calHtml = '';
            for (let i = 1; i <= daysInMonth; i++) {
                const dStr = `${year}-${String(month+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                const recs = dailyRecords.filter(r => r.date === dStr);
                calHtml += `<div class="cal-cell" onclick="openDailyDetail('${dStr}')"><div class="cal-date-num">${i}</div>${recs.map(r => `<div class="cal-record-pill">${r.title}</div>`).join('')}</div>`;
            }
            document.getElementById('calendar-days').innerHTML = calHtml;
        }
        function openModal(t) {
            editTargetIndex = -1;
            document.getElementById('modal-book-title-input').value = t;
            document.getElementById('modal-book-title-input').style.display = 'block';
            document.getElementById('modal-book-title-select').style.display = 'none';
            document.getElementById('modal-date').value = new Date().toISOString().split('T')[0];
            document.getElementById('modal-total-pages').innerText = getTotalPages(t);
            document.getElementById('record-modal').style.display = 'flex';
        }
        function openRecordModalNew() {
            const titles = []; 
            for(let s in myLibrary.series) titles.push(...myLibrary.series[s]);
            if(titles.length === 0) return alert("서재에 책을 먼저 추가하세요.");
            const select = document.getElementById('modal-book-title-select');
            select.innerHTML = titles.map(t => `<option value="${t}">${t}</option>`).join('');
            document.getElementById('modal-book-title-input').style.display = 'none';
            select.style.display = 'block';
            openModal(select.value);
        }
        function openDailyDetail(d) {
            const recs = dailyRecords.filter(r => r.date === d);
            if(recs.length === 0) return;
            document.getElementById('daily-detail-title').innerText = d;
            document.getElementById('daily-detail-list').innerHTML = recs.map(r => `<div><strong>${r.title}</strong>: ${r.note}</div>`).join('');
            document.getElementById('daily-detail-modal').style.display = 'flex';
        }
        function changeMonth(n) { currentCalDate.setMonth(currentCalDate.getMonth() + n); renderCalendar(); }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function changeTab(id, title, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active'); el.classList.add('active');
            document.getElementById('header-title').innerText = title;
        }
        function renderApp() { renderMyLibrary(); renderCalendar(); updateHeader(); saveData(); }
        window.onload = () => { renderApp(); };
    </script>
</body>
</html>
